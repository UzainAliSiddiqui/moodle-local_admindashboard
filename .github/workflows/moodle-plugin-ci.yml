name: Moodle Plugin CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        moodle-branch: ['MOODLE_405_STABLE', 'MOODLE_500_STABLE']

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, gd, intl, mbstring, mysqli, pgsql, soap, xml, xmlrpc, zip
          coverage: none

      - name: Install moodle-plugin-ci
        run: composer global require moodlehq/moodle-plugin-ci

      - name: Install Moodle
        run: moodle-plugin-ci install --moodle=${{ matrix.moodle-branch }}

      - name: PHP lint
        run: moodle-plugin-ci phplint

      - name: Validate plugin
        run: moodle-plugin-ci validate
